<body>
  <div id="landing-section" class="landing-section">
    <div class="background-slider">
      <div class="bg-image active" data-index="0"></div>

  <script>
    window.backgroundConfig = {
      backgrounds: [
        { image: '/images/bg-1.jpg', subtitle: 'Miku' },
        { image: '/images/bg-2.jpg', subtitle: 'Ayase' },
        { image: '/images/bg-3.jpg', subtitle: 'Rin/Ren' }
      ],
      autoPlayInterval: 5000
    };
  </script>
  <script>
    (function() {
      'use strict';

      var config = window.backgroundConfig || { backgrounds: [], autoPlayInterval: 5000 };
      var backgrounds = config.backgrounds;
      var currentIndex = 0;
      var autoPlayTimer = null;
      var isTransitioning = false;

      var bgImages = document.querySelectorAll('.bg-image');
      var subtitleEl = document.getElementById('landing-subtitle');
      var prevBtn = document.getElementById('nav-prev');
      var nextBtn = document.getElementById('nav-next');

      function init() {
        if (backgrounds.length === 0) {
          console.warn('No backgrounds configured');
          return;
        }

        // Initialize background images
        bgImages.forEach(function(img, index) {
          if (backgrounds[index]) {
            img.style.backgroundImage = 'url(' + backgrounds[index].image + ')';
          }
        });

        // Update subtitle
        updateSubtitle();

        // Preload next image
        preloadImage(getNextIndex(1));

        // Start autoplay
        startAutoPlay();

        // Bind events
        bindEvents();
      }

      function getNextIndex(direction) {
        var newIndex = currentIndex + direction;
        if (newIndex < 0) {
          return backgrounds.length - 1;
        } else if (newIndex >= backgrounds.length) {
          return 0;
        }
        return newIndex;
      }

      function updateSubtitle() {
        if (subtitleEl && backgrounds[currentIndex]) {
          subtitleEl.style.opacity = '0';
          setTimeout(function() {
            subtitleEl.textContent = backgrounds[currentIndex].subtitle;
            subtitleEl.style.opacity = '0.9';
          }, 300);
        }
      }

      function preloadImage(index) {
        if (backgrounds[index]) {
          var img = new Image();
          img.src = backgrounds[index].image;
        }
      }

      function goToSlide(index, isManual) {
        if (isTransitioning || index === currentIndex || backgrounds.length === 0) {
          return;
        }

        isTransitioning = true;

        // Find current active element
        var currentBg = null;
        var nextBg = null;
        
        for (var i = 0; i < bgImages.length; i++) {
          if (bgImages[i].classList.contains('active')) {
            currentBg = bgImages[i];
          }
        }
        
        // Find an inactive element for the next slide
        for (var i = 0; i < bgImages.length; i++) {
          if (!bgImages[i].classList.contains('active')) {
            nextBg = bgImages[i];
            break;
          }
        }
        
        // Fallback if something went wrong
        if (!currentBg) currentBg = bgImages[0];
        if (!nextBg) nextBg = bgImages[1] || bgImages[0];

        // Set next background image before showing
        if (backgrounds[index]) {
          nextBg.style.backgroundImage = 'url(' + backgrounds[index].image + ')';
        }

        // Smooth transition: fade out current, fade in next
        // First, make sure next image is below current
        nextBg.style.zIndex = '0';
        nextBg.classList.remove('fade-out');
        
        // Small delay to ensure z-index is applied
        setTimeout(function() {
          // Add active to next (it will fade in)
          nextBg.classList.add('active');
          
          // Fade out current
          currentBg.classList.remove('active');
          currentBg.classList.add('fade-out');
          
          // After transition, reset z-index
          setTimeout(function() {
            currentBg.classList.remove('fade-out');
            currentBg.style.zIndex = '';
            nextBg.style.zIndex = '';
          }, 1200);
        }, 50);

        // Update index
        currentIndex = index;

        // Update subtitle
        updateSubtitle();

        // Preload next image
        preloadImage(getNextIndex(1));

        // Reset transition flag
        setTimeout(function() {
          isTransitioning = false;
        }, 1250);

        // Reset autoplay only on manual navigation
        if (isManual) {
          resetAutoPlay();
        }
      }

      function nextSlide(isManual) {
        goToSlide(getNextIndex(1), isManual);
      }

      function prevSlide() {
        goToSlide(getNextIndex(-1), true);
      }

      function startAutoPlay() {
        if (backgrounds.length <= 1) return;
        stopAutoPlay(); // 确保清除之前的计时器
        autoPlayTimer = setInterval(function() {
          nextSlide(false); // false 表示自动播放，不重置计时器
        }, config.autoPlayInterval);
      }

      function stopAutoPlay() {
        if (autoPlayTimer) {
          clearInterval(autoPlayTimer);
          autoPlayTimer = null;
        }
      }

      function resetAutoPlay() {
        stopAutoPlay();
        startAutoPlay();
      }

      function bindEvents() {
        if (prevBtn) {
          prevBtn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            prevSlide();
          });
        }

        if (nextBtn) {
          nextBtn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            nextSlide(true); // true 表示手动操作
          });
        }

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
          if (e.key === 'ArrowLeft') {
            prevSlide();
          } else if (e.key === 'ArrowRight') {
            nextSlide(true); // true 表示手动操作
          }
        });

        // Pause autoplay on hover
        var landingSection = document.getElementById('landing-section');
        if (landingSection) {
          landingSection.addEventListener('mouseenter', stopAutoPlay);
          landingSection.addEventListener('mouseleave', startAutoPlay);
        }

        // Visibility API - pause when tab is hidden
        document.addEventListener('visibilitychange', function() {
          if (document.hidden) {
            stopAutoPlay();
          } else {
            startAutoPlay();
          }
        });
      }

      // Initialize when DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
